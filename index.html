<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CJM Finance | Secure Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="login-wrapper">
        <div class="login-header">
            <div class="logo">
                <img src="logo/WhatsApp_Image_2025-12-31_at_09.17.54-removebg-preview (1).png" alt="CJM Finance Logo" class="logo-img" style="max-width: 100%; height: auto;">
                <h1>CJM Finance</h1>
            </div>
            <p>Enter your credentials to access your account.</p>
        </div>
        
        <form id="loginForm" class="login-form">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username" required autocomplete="username">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <div class="login-options">
                <label class="remember-me">
                    <input type="checkbox"> Remember me
                </label>
                <a href="#" class="forgot-link">Forgot Password?</a>
            </div>
            <button type="submit" class="btn btn-primary">Sign In</button>
            <p id="errorMessage" class="error-message"></p>
        </form>
        
        <div class="login-footer">
            <p>&copy; 2026 CJM Finance. Secure & Reliable.</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
